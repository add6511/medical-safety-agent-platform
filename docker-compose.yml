version: '3.8'

services:
  # ============ 数据层 ============
  mysql:
    image: mysql:8.0
    container_name: medical-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-medical_safety}
      MYSQL_USER: ${MYSQL_USER:-medical}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-medical123}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medical-network

  postgres:
    image: pgvector/pgvector:pg15
    container_name: medical-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medical_vector}
      POSTGRES_USER: ${POSTGRES_USER:-vector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vector123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-vector}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medical-network

  redis:
    image: redis:7-alpine
    container_name: medical-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medical-network

  # ============ 业务层 ============
  backend:
    build: ./backend
    container_name: medical-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-medical_safety}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-medical}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-medical123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      JWT_SECRET: jwtSecretKey12345678901234567890123456789012
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - medical-network

  ai-service:
    build: ./ai-service
    container_name: medical-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PGVECTOR_HOST: postgres
      PGVECTOR_PORT: 5432
      PGVECTOR_DB: ${POSTGRES_DB:-medical_vector}
      PGVECTOR_USER: ${POSTGRES_USER:-vector}
      PGVECTOR_PASSWORD: ${POSTGRES_PASSWORD:-vector123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - medical-network

  # ============ 前端 ============
  frontend:
    build: ./frontend
    container_name: medical-frontend
    restart: unless-stopped
    networks:
      - medical-network

  # ============ 网关 ============
  nginx:
    image: nginx:alpine
    container_name: medical-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - ai-service
    networks:
      - medical-network
# ============ 网络 & 卷 ============
networks:
  medical-network:
    driver: bridge

volumes:
  mysql_data:
  postgres_data:
  redis_data: